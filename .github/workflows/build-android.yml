name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Build notes'
        required: false
        default: 'Manual build'

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        working-directory: customer_app
        run: npm install

      - name: Sync web assets
        working-directory: customer_app
        run: npx cap sync android

      - name: Build APK
        working-directory: customer_app/android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KC-Legacy-Android
          path: customer_app/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
