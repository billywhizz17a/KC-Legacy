name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      notes:
        description: 'Build notes'
        required: false
        default: 'Manual build'

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: customer_app
        run: npm install

      - name: Add iOS platform
        working-directory: customer_app
        run: npx cap add ios || true

      - name: Sync web assets to iOS
        working-directory: customer_app
        run: npx cap sync ios

      # ── Code Signing ──
      # These secrets must be set in GitHub repo settings:
      #   IOS_CERTIFICATE_BASE64  — .p12 certificate (base64 encoded)
      #   IOS_CERTIFICATE_PASSWORD — password for the .p12
      #   IOS_PROVISIONING_PROFILE_BASE64 — .mobileprovision (base64 encoded)
      #   IOS_TEAM_ID — Apple Developer Team ID (e.g. ABCDE12345)

      - name: Decode certificate and provisioning profile
        if: ${{ env.IOS_CERTIFICATE_BASE64 != '' }}
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          CERT_DIR="$RUNNER_TEMP/certs"
          mkdir -p "$CERT_DIR"
          echo "$IOS_CERTIFICATE_BASE64" | base64 -d > "$CERT_DIR/build_cert.p12"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -d > "$CERT_DIR/build_profile.mobileprovision"

          # Import certificate into keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/app.keychain"
          security create-keychain -p "$IOS_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_DIR/build_cert.p12" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          # Install provisioning profile
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          PP_UUID=$(grep -aA1 "UUID" "$CERT_DIR/build_profile.mobileprovision" | grep -o '[A-F0-9-]\{36\}')
          cp "$CERT_DIR/build_profile.mobileprovision" "$PP_DIR/$PP_UUID.mobileprovision"
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV

      - name: Create exportOptions.plist
        working-directory: customer_app
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          PP_UUID: ${{ env.PP_UUID }}
        run: |
          if [ -n "$PP_UUID" ]; then
            cat > ios/App/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.KCLegacy.customer</key>
              <string>${PP_UUID}</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
          </dict>
          </plist>
          EOF
          else
            # No signing — build unsigned IPA for testing
            cat > ios/App/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
          </dict>
          </plist>
          EOF
          fi

      - name: Build IPA
        working-directory: customer_app/ios/App
        run: |
          if [ -n "${{ env.PP_UUID }}" ]; then
            # Signed build
            xcodebuild -workspace App.xcworkspace \
              -scheme App \
              -configuration Release \
              -archivePath build/App.xcarchive \
              -allowProvisioningUpdates \
              archive \
              CODE_SIGN_STYLE=manual \
              PROVISIONING_PROFILE_SPECIFIER="" \
              PROVISIONING_PROFILE="${{ env.PP_UUID }}" \
              DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}"

            xcodebuild -exportArchive \
              -archivePath build/App.xcarchive \
              -exportPath build/ipa \
              -exportOptionsPlist exportOptions.plist
          else
            # Unsigned build (for testing — won't install on devices without signing)
            xcodebuild -workspace App.xcworkspace \
              -scheme App \
              -configuration Release \
              -archivePath build/App.xcarchive \
              -allowProvisioningUpdates \
              archive \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO

            # Create unsigned IPA manually
            mkdir -p build/ipa/Payload
            cp -r build/App.xcarchive/Products/Applications/App.app build/ipa/Payload/
            cd build/ipa && zip -r App-unsigned.ipa Payload
          fi

      - name: Find IPA file
        id: find_ipa
        working-directory: customer_app/ios/App/build
        run: |
          IPA_PATH=$(find . -name "*.ipa" -type f | head -1)
          echo "ipa_path=$IPA_PATH" >> $GITHUB_OUTPUT
          echo "Found IPA: $IPA_PATH"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: KC-Legacy-iOS
          path: customer_app/ios/App/build/${{ steps.find_ipa.outputs.ipa_path }}
          retention-days: 30

      - name: Clean up keychain
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/app.keychain" ]; then
            security delete-keychain "$RUNNER_TEMP/app.keychain" 2>/dev/null || true
          fi
