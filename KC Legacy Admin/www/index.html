<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#d4af37">
  <title>KC Legacy - Admin</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E">
</head>
<body>

  <!-- Splash / Login Screen -->
  <div id="login-screen" class="screen active">
    <div class="login-box">
      <img src="header2.jpg" alt="KC Legacy Valeting" class="login-banner">
      <div class="gold-line"></div>
      <p class="login-desc">Admin Dashboard</p>
      <input type="password" id="entry-input" placeholder="Enter Admin Entry Name" autocomplete="off">
      <button id="login-btn" class="btn-gold">ACCESS DASHBOARD</button>
      <p id="login-error" class="error-msg"></p>
    </div>
  </div>

  <!-- Main App Screen -->
  <div id="app-screen" class="screen">
    <!-- Header -->
    <header class="app-header">
      <span></span>
      <button id="logout-btn" class="btn-small">Logout</button>
    </header>

    <!-- Connection Status -->
    <div id="conn-status" class="conn-bar">Connecting...</div>

    <!-- Stats Cards -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-number" id="stat-bookings">0</div>
        <div class="stat-label">Bookings</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-upcoming">0</div>
        <div class="stat-label">Upcoming</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="bookings">Bookings</button>
      <button class="tab-btn" data-tab="calendar">Calendar</button>
    </div>

    <!-- Bookings Tab -->
    <div id="tab-bookings" class="tab-panel active">
      <div class="panel-header">
        <div class="panel-title">
          <h2>Recent Bookings</h2>
          <span id="current-datetime" class="datetime-label"></span>
        </div>
        <button id="refresh-bookings" class="btn-icon">&#x21bb;</button>
      </div>
      <div id="bookings-list" class="item-list">
        <div class="loading">Loading bookings...</div>
      </div>
    </div>

    <!-- Calendar Tab -->
    <div id="tab-calendar" class="tab-panel">
      <div class="panel-header">
        <h2>Booking Calendar</h2>
        <button id="refresh-calendar" class="btn-icon">&#x21bb;</button>
      </div>
      <div id="calendar-container" class="calendar-container">
        <div class="loading">Loading calendar...</div>
      </div>
    </div>
  </div>

  <!-- Booking Detail Modal -->
  <div id="booking-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Booking Details</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div id="booking-content" class="booking-text"></div>

      <!-- Admin Response Section -->
      <div class="response-section">
        <div class="detail-label">Send Response</div>
        <textarea id="response-msg" placeholder="Type your message to the customer..."></textarea>
        <div class="response-actions">
          <button id="send-sms-btn" class="btn-gold">Send via Message</button>
          <button id="send-email-btn" class="btn-gold">Send via Email</button>
        </div>
        <div id="response-status" class="response-status"></div>
      </div>

      <button id="delete-booking-btn" class="btn-danger">Delete Booking</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
