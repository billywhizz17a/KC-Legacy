<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#d4af37">
  <title>KC Legacy - Admin</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

  <!-- Splash / Login Screen -->
  <div id="login-screen" class="screen active">
    <div class="login-box">
      <img src="header2.jpg" alt="KC Legacy Valeting" class="login-banner">
      <div class="gold-line"></div>
      <p class="login-desc">Admin Dashboard</p>
      <input type="password" id="entry-input" placeholder="Enter Admin Entry Name" autocomplete="off">
      <button id="login-btn" class="btn-gold">ACCESS DASHBOARD</button>
      <p id="login-error" class="error-msg"></p>
    </div>
  </div>

  <!-- Main App Screen -->
  <div id="app-screen" class="screen">
    <!-- Header -->
    <header class="app-header">
      <img src="header2.jpg" alt="KC Legacy" class="header-banner">
      <button id="logout-btn" class="btn-small">Logout</button>
    </header>

    <!-- Connection Status -->
    <div id="conn-status" class="conn-bar">Connecting...</div>

    <!-- Stats Cards -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-number" id="stat-bookings">0</div>
        <div class="stat-label">Bookings</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="stat-images">0</div>
        <div class="stat-label">Images</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="bookings">Bookings</button>
      <button class="tab-btn" data-tab="gallery">Gallery</button>
    </div>

    <!-- Bookings Tab -->
    <div id="tab-bookings" class="tab-panel active">
      <div class="panel-header">
        <h2>Recent Bookings</h2>
        <button id="refresh-bookings" class="btn-icon">&#x21bb;</button>
      </div>
      <div id="bookings-list" class="item-list">
        <div class="loading">Loading bookings...</div>
      </div>
    </div>

    <!-- Gallery Tab -->
    <div id="tab-gallery" class="tab-panel">
      <div class="panel-header">
        <h2>Image Gallery</h2>
        <button id="refresh-gallery" class="btn-icon">&#x21bb;</button>
      </div>
      <div id="gallery-grid" class="gallery-grid">
        <div class="loading">Loading images...</div>
      </div>
    </div>
  </div>

  <!-- Booking Detail Modal -->
  <div id="booking-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Booking Details</h3>
        <button class="modal-close">&times;</button>
      </div>
      <pre id="booking-content" class="booking-text"></pre>
      <button id="delete-booking-btn" class="btn-danger">Delete Booking</button>
    </div>
  </div>

  <!-- Image Viewer Modal -->
  <div id="image-modal" class="modal image-modal">
    <div class="modal-content image-content">
      <button class="modal-close image-close">&times;</button>
      <img id="viewer-img" src="" alt="Preview">
      <div id="image-filename" class="image-name"></div>
      <button id="delete-image-btn" class="btn-danger">Delete Image</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
